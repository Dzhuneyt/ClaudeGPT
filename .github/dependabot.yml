version: 2
updates:
  # The cchat harness itself is a single bash script with no package manifest,
  # so its only CI dependency surface is the GitHub Actions used in workflows.
  # Keep those pinned action SHAs current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"

  # website/ is an Astro static site (added in PR #8) shipping package.json +
  # package-lock.json. Keep its npm dependencies current.
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
